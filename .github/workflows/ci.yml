name: MLflow Automated Retraining CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  mlflow-retraining-pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. Run actions/checkout (Di-update ke v4 biar aman)
    - name: Run actions/checkout@v4
      uses: actions/checkout@v4

    # 2. Set up Python 3.12.7 (Di-update ke v5 biar matching)
    - name: Set up Python 3.12.7
      uses: actions/setup-python@v5
      with:
        python-version: "3.12.7"

    # 3. Check Operating System and Python Env
    - name: Check Env
      run: |
        python --version
        pip --version

    # 4. Install dependencies yang dibutuhkan MLflow
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow psutil flask numpy pandas scikit-learn

    # 5. 🔥 EKSEKUSI RETRAINING REKOMENDASI REVIEWER
    - name: Run mlflow project
      run: |
        echo "Memulai proses retraining otomatis menggunakan perintah mlflow run..."
        mlflow run MLProject --no-conda

    # 6. Mengambil run_id MLflow terbaru hasil training di atas
    - name: Get latest MLflow run_id
      run: |
        echo "Mengekstrak Run ID dari experiment..."
        RUN_ID=$(ls -t mlruns/0/ | head -n 1)
        echo "Latest Run ID found: $RUN_ID"

    # 7. 🌟 SYARAT SKILLED: Upload Artefak Model (SUDAH FIX v4!)
    - name: Upload to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: retrained-mlflow-model
        path: mlruns/0/
